services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: lister-web
    ports:
      - "3002:3000"
    env_file:
      - /data/services/lister/.env
    depends_on:
      - typesense
    restart: unless-stopped

  typesense:
    image: typesense/typesense:27.1
    container_name: lister-typesense
    ports:
      - "8108:8108"
    env_file:
      - /data/services/lister/.env
    volumes:
      - typesense-data:/data
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_ADMIN_API_KEY}
      --enable-cors
    restart: unless-stopped

volumes:
  typesense-data:
