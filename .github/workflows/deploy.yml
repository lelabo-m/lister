name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          set -a
          source /data/services/lister/.env
          set +a
          bun run build

      - name: Deploy
        run: |
          docker compose -f docker-compose.prod.yml --env-file /data/services/lister/.env down --remove-orphans
          docker compose -f docker-compose.prod.yml --env-file /data/services/lister/.env up -d --build
