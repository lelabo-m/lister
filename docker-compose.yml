services:
  typesense:
    image: typesense/typesense:27.1
    container_name: lister-typesense
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_ADMIN_API_KEY:-Vi4nTkb7syW8xaa26VHAfoZRzji68Ubs}
      --enable-cors

volumes:
  typesense-data:
